paths:
  label_file: "data/gcp_marks.json"
  train_dir: "data/train_dataset"
  test_dir: "data/test_dataset"
  output_dir: "outputs"

classes: ["Cross", "Square", "L-Shape"]

input:
  width: 768          # letterbox canvas W (multiple of 32)
  height: 576         # letterbox canvas H (multiple of 32, ~4:3)
  heatmap_stride: 4   # heatmap is input/4 → 192x144

model:
  backbone: "resnet50"
  pretrained: true
  kp_head: "heatmap"  # "heatmap" (DSNT, default) or "regression" (fallback)
  dropout: 0.3

training:
  batch_size: 12
  num_epochs: 60
  lr: 1.0e-4
  weight_decay: 1.0e-4
  val_frac: 0.15
  seed: 42
  kp_loss_weight: 1.0
  cls_loss_weight: 0.5
  dsnt_reg_weight: 0.1   # soft-CE heatmap regularizer; ~1.0 contribution early, decays as it sharpens
  patience: 15
  num_workers: 2
  crop_epochs: 30        # stage-2 crop classifier (shape from a high-res crop around the marker)
  crop_batch_size: 32

predict:
  tta: true
